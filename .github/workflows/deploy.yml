name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: portfolio-src/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: portfolio-src

      - name: Build
        run: npm run build
        working-directory: portfolio-src

      - name: Commit built files to main branch root
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets/ -f
          git diff --staged --quiet || git commit -m "ci: update compiled assets [skip ci]"
          git push origin main
