name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: portfolio-src/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: portfolio-src

      - name: Build
        run: npx vite build --outDir ../dist_output --emptyOutDir
        working-directory: portfolio-src

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist_output'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
